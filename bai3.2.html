<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Tính tuổi</title>
	<style>
		.box { background: #d9d9d9; width: 400px; margin: 50px auto; padding: 20px; text-align: center; font-family: serif; font-size: 18px; }
		#ketqua { color: red; margin-top: 15px; font-size: 20px; }
	</style>
	<script> 
		function tinhTuoi() { 
			let ns = document.getElementById("namsinh").value;
			let kq = document.getElementById("ketqua");
			let hienTai = new Date().getFullYear();

			if (!ns || isNaN(ns)) {
				kq.innerHTML = "Năm sinh không hợp lệ!";
			} else if (ns > hienTai || ns < 1900) {
				kq.innerHTML = "Năm sinh không logic!";
			} else {
				kq.innerHTML = "Tuổi của bạn là: " + (hienTai - ns); 
			}
		} 
	</script> 
</head> 
<body> 
	<div class="box">
		<h2>Tính tuổi</h2>
		Năm sinh: <input type="text" id="namsinh" value="1993" size="10"> 
		<button onclick="tinhTuoi()">Tính tuổi</button> 
		<div id="ketqua"></div>
	</div>
</body> 
</html>
